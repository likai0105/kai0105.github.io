<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DXF绘图工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>

            addLine(x1, y1, x2, y2, lineweight = 20) {

            }
            toDxfString() {
                return this.header + this.lines.join('\n') + this.footer;
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .panel-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
            .btn-hover { @apply transition-all duration-200 hover:bg-opacity-80 active:scale-95; }
            .input-focus { @apply focus:ring-2 focus:ring-primary focus:outline-none; }
            .canvas-container { touch-action: none; }
        }
        body { overscroll-behavior: none; touch-action: none; }
        .control-panel { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .slider-thumb::-webkit-slider-thumb { @apply appearance-none w-5 h-5 rounded-full bg-primary cursor-pointer; }
        .slider-thumb::-moz-range-thumb { @apply w-5 h-5 rounded-full bg-primary border-0 cursor-pointer; }
        .num-btn { font-size: 1.25rem !important; padding: 0.8rem !important; }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden h-screen">
<div class="flex flex-col h-screen relative">
    <div class="absolute top-4 left-1/2 transform -translate-x-1/2 z-10 flex items-center space-x-4 bg-dark bg-opacity-70 px-4 py-2 rounded-full panel-shadow">
        <button id="zoom-in" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-800 btn-hover"><i class="fa fa-search-plus"></i></button>
        <button id="zoom-out" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-800 btn-hover"><i class="fa fa-search-minus"></i></button>
        <button id="zoom-reset" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-800 btn-hover"><i class="fa fa-arrows-alt"></i></button>
        <div class="h-6 border-r border-gray-600 mx-1"></div>
        <button id="history-btn" class="w-10 h-10 flex items-center justify-center rounded-full bg-accent btn-hover"><i class="fa fa-history"></i></button>
        <button id="save-btn" class="w-10 h-10 flex items-center justify-center rounded-full bg-primary btn-hover"><i class="fa fa-download"></i></button>
    </div>

    <div id="canvas-container" class="canvas-container flex-1 relative overflow-hidden">
        <canvas id="drawing-canvas" class="absolute top-0 left-0"></canvas>
    </div>

    <!-- 左侧面板 -->
    <div class="absolute left-4 top-1/2 transform -translate-y-1/2 z-10 control-panel bg-dark bg-opacity-70 rounded-2xl p-4 w-36 panel-shadow">
        <div class="mb-4">
            <label class="block text-xs text-gray-400 mb-1">长度 (mm)</label>
            <div class="relative">
                <input type="number" id="distance-input" class="w-full bg-gray-800 rounded-lg px-3 py-2 text-center input-focus text-lg" value="100" min="1" max="200000">
                <div class="absolute -right-2 -top-2 bg-primary text-xs px-2 py-1 rounded-full">mm</div>
            </div>
            <div class="mt-2 grid grid-cols-3 gap-2">
                <button class="num-btn bg-gray-800 hover:bg-gray-700 rounded text-center" data-value="1">1</button>
                <button class="num-btn bg-gray-800 hover:bg-gray-700 rounded text-center" data-value="2">2</button>
                <button class="num-btn bg-gray-800 hover:bg-gray-700 rounded text-center" data-value="3">3</button>
                <button class="num-btn bg-gray-800 hover:bg-gray-700 rounded text-center" data-value="4">4</button>
                <button class="num-btn bg-gray-800 hover:bg-gray-700 rounded text-center" data-value="5">5</button>
                <button class="num-btn bg-gray-800 hover:bg-gray-700 rounded text-center" data-value="6">6</button>
                <button class="num-btn bg-gray-800 hover:bg-gray-700 rounded text-center" data-value="7">7</button>
                <button class="num-btn bg-gray-800 hover:bg-gray-700 rounded text-center" data-value="8">8</button>
                <button class="num-btn bg-gray-800 hover:bg-gray-700 rounded text-center" data-value="9">9</button>
                <button class="num-btn bg-gray-800 hover:bg-gray-700 rounded text-center" data-value="0">0</button>
                <button class="num-btn bg-gray-800 hover:bg-gray-700 rounded text-center" data-value="00">00</button>
                <button id="clear-btn" class="bg-red-600 hover:bg-red-500 rounded text-center">清除</button>
            </div>
        </div>

        <button id="show-length-btn" class="w-full bg-purple-600 hover:bg-purple-500 rounded-lg py-3 mb-2 btn-hover text-sm">显示长度</button>
        <button id="confirm-btn" class="w-full bg-green-600 hover:bg-green-500 rounded-lg py-3 mb-2 btn-hover">确认</button>
        <button id="delete-btn" class="w-full bg-red-600 hover:bg-red-500 rounded-lg py-3 mb-3 btn-hover">删除</button>

        <div class="mb-2">
            <label class="block text-xs text-gray-400 mb-1">线宽</label>
            <input type="range" id="line-width" class="w-full slider-thumb" min="1" max="10" value="2">
            <div class="text-center text-xs mt-1" id="line-width-value">2px</div>
        </div>
    </div>

    <!-- 右侧面板 -->
    <div class="absolute right-4 top-1/2 transform -translate-y-1/2 z-10 control-panel bg-dark bg-opacity-70 rounded-2xl p-4 w-28 panel-shadow">
        <button id="set-start-btn" class="w-full bg-accent hover:bg-yellow-500 rounded-lg py-2 mb-4 btn-hover text-sm">选择起点</button>
        <div class="space-y-2 mb-4">
            <button class="direction-btn w-full bg-primary hover:bg-blue-600 py-3 btn-hover" data-dir="up"><i class="fa fa-arrow-up"></i></button>
            <div class="flex gap-1">
                <button class="direction-btn flex-1 bg-primary hover:bg-blue-600 py-3 btn-hover" data-dir="left"><i class="fa fa-arrow-left"></i></button>
                <button class="direction-btn flex-1 bg-primary hover:bg-blue-600 py-3 btn-hover" data-dir="right"><i class="fa fa-arrow-right"></i></button>
            </div>
            <button class="direction-btn w-full bg-primary hover:bg-blue-600 py-3 btn-hover" data-dir="down"><i class="fa fa-arrow-down"></i></button>
        </div>
        <div class="bg-gray-800 rounded p-2 text-xs text-center">
            <div id="pos">X:0 Y:0</div>
        </div>
    </div>
</div>

<script>
let canvas, ctx;
let cx=0, cy=0;
let scale=1, ox=0, oy=0;
let lines=[];
let lineWidth=2;
let showLength=false;
let dir=null;
let grid=10;
let canvasMin = -100000, canvasMax=100000;

let isDrag=false, lastX, lastY;
let isPinch=false, pinchStartDist=1, pinchStartScale=1;
let isDel=false, isSetStart=false;

function init(){
    canvas=document.getElementById('drawing-canvas');
    ctx=canvas.getContext('2d');
    resize();
    window.addEventListener('resize',resize);
    bind();
    draw();
}

function resize(){
    let c=document.getElementById('canvas-container');
    canvas.width=c.clientWidth;
    canvas.height=c.clientHeight;
    draw();
}

function bind(){
    // 数字键
    document.querySelectorAll('.num-btn').forEach(b=>{
        b.onclick=()=>{
            let i=document.getElementById('distance-input');
            i.value+=b.dataset.value;
            if(+i.value>200000)i.value=200000;
        }
    });
    // 清除
    document.getElementById('clear-btn').onclick=()=>{
        document.getElementById('distance-input').value='';
    };
    // 方向
    document.querySelectorAll('.direction-btn').forEach(b=>{
        b.onclick=()=>{
            document.querySelectorAll('.direction-btn').forEach(x=>x.classList.remove('bg-blue-700'));
            b.classList.add('bg-blue-700');
            dir=b.dataset.dir;
        }
    });
    // 确认
    document.getElementById('confirm-btn').onclick=()=>{
        if(!dir)return;
        let v=+document.getElementById('distance-input').value;
        if(v<1)return;
        drawLine(dir,v);
        document.getElementById('distance-input').value='';
        document.querySelectorAll('.direction-btn').forEach(x=>x.classList.remove('bg-blue-700'));
        dir=null;
        centerView();
    };
    // 显示长度
    document.getElementById('show-length-btn').onclick=e=>{
        showLength=!showLength;
        e.target.textContent=showLength?'隐藏长度':'显示长度';
        draw();
    };
    // 删除模式
    document.getElementById('delete-btn').onclick=()=>{
        isDel=!isDel;
        let b=document.getElementById('delete-btn');
        if(isDel){
            b.classList.remove('bg-red-600');
            b.classList.add('bg-gray-500');
            b.textContent='确认删除';
        }else{
            b.classList.remove('bg-gray-500');
            b.classList.add('bg-red-600');
            b.textContent='删除';
        }
    };
    // 起点
    document.getElementById('set-start-btn').onclick=()=>{
        isSetStart=!isSetStart;
    };
    // 线宽
    document.getElementById('line-width').oninput=e=>{
        lineWidth=+e.target.value;
        document.getElementById('line-width-value').textContent=lineWidth+'px';
    };
    // 缩放按钮
    document.getElementById('zoom-in').onclick=()=>{scale*=1.2;draw();}
    document.getElementById('zoom-out').onclick=()=>{scale/=1.2;draw();}
    document.getElementById('zoom-reset').onclick=()=>{scale=1;ox=0;oy=0;draw();}
    // 保存DXF
    document.getElementById('save-btn').onclick=saveDXF;

    // 鼠标
    canvas.onmousedown=e=>{
        if(isSetStart){
            let r=canvas.getBoundingClientRect();
            let x=(e.clientX-r.left-ox)/scale;
            let y=(e.clientY-r.top-oy)/scale;
            cx=Math.round(x/grid)*grid;
            cy=Math.round(y/grid)*grid;
            isSetStart=false;
            draw();
            return;
        }
        if(isDel){
            let r=canvas.getBoundingClientRect();
            let x=(e.clientX-r.left-ox)/scale;
            let y=(e.clientY-r.top-oy)/scale;
            lines=lines.filter(L=>!near(x,y,L));
            isDel=false;
            document.getElementById('delete-btn').textContent='删除';
            document.getElementById('delete-btn').classList.remove('bg-gray-500');
            document.getElementById('delete-btn').classList.add('bg-red-600');
            draw();
            return;
        }
        isDrag=true; lastX=e.clientX; lastY=e.clientY;
    };
    canvas.onmousemove=e=>{
        if(!isDrag)return;
        ox+=e.clientX-lastX;
        oy+=e.clientY-lastY;
        lastX=e.clientX; lastY=e.clientY;
        draw();
    };
    canvas.onmouseup=()=>{isDrag=false;}
    canvas.onmouseleave=()=>{isDrag=false;}

    // 触摸
    canvas.ontouchstart=e=>{
        e.preventDefault();
        if(e.touches.length===2){
            isPinch=true;
            let t1=e.touches[0],t2=e.touches[1];
            pinchStartDist=dist(t1,t2);
            pinchStartScale=scale;
        }
        if(e.touches.length===1){
            lastX=e.touches[0].clientX;
            lastY=e.touches[0].clientY;
        }
    };
    canvas.ontouchmove=e=>{
        e.preventDefault();
        if(e.touches.length===2 && isPinch){
            let d=dist(e.touches[0],e.touches[1]);
            scale=pinchStartScale*(d/pinchStartDist);
            scale=Math.max(0.1,Math.min(10,scale));
            draw();
        }
        if(e.touches.length===1 && !isPinch){
            let t=e.touches[0];
            ox+=t.clientX-lastX;
            oy+=t.clientY-lastY;
            lastX=t.clientX; lastY=t.clientY;
            draw();
        }
    };
    canvas.ontouchend=e=>{
        isPinch=false;
    };
}

function drawLine(d,len){
    let x1=cx,y1=cy,x2=cx,y2=cy;
    switch(d){
        case 'up':y2-=len;break;
        case 'down':y2+=len;break;
        case 'left':x2-=len;break;
        case 'right':x2+=len;break;
    }
    x2=Math.max(canvasMin,Math.min(canvasMax,x2));
    y2=Math.max(canvasMin,Math.min(canvasMax,y2));
    lines.push({x1,y1,x2,y2,w:lineWidth,len});
    cx=x2; cy=y2;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.save();
    ctx.translate(ox,oy);
    ctx.scale(scale,scale);

    lines.forEach(L=>{
        ctx.beginPath();
        ctx.moveTo(L.x1,L.y1);
        ctx.lineTo(L.x2,L.y2);
        ctx.strokeStyle='#fff';
        ctx.lineWidth=L.w/scale;
        ctx.stroke();
        if(showLength){
            let mx=(L.x1+L.x2)/2, my=(L.y1+L.y2)/2-8;
            ctx.font=`${14/scale}px Arial`;
            ctx.fillStyle='#34d399';
            ctx.textAlign='center';
            ctx.fillText(L.len+'mm',mx,my);
        }
    });

    ctx.beginPath();
    ctx.arc(cx,cy,5/scale,0,Math.PI*2);
    ctx.fillStyle='#3b82f6';
    ctx.fill();

    ctx.restore();
    document.getElementById('pos').textContent=`X:${cx} Y:${cy}`;
}

function centerView(){
    if(lines.length===0)return;
    let xs=lines.flatMap(L=>[L.x1,L.x2]);
    let ys=lines.flatMap(L=>[L.y1,L.y2]);
    let minX=Math.min(...xs),maxX=Math.max(...xs);
    let minY=Math.min(...ys),maxY=Math.max(...ys);
    let mx=(minX+maxX)/2, my=(minY+maxY)/2;
    ox=canvas.width/2 - mx*scale;
    oy=canvas.height/2 - my*scale;
    draw();
}

function near(x,y,L){
    let dx=L.x2-L.x1, dy=L.y2-L.y1;
    if(dx===0&&dy===0)return false;
    let t=((x-L.x1)*dx + (y-L.y1)*dy)/(dx*dx+dy*dy);
    t=Math.max(0,Math.min(1,t));
    let px=L.x1+t*dx, py=L.y1+t*dy;
    return Math.hypot(x-px,y-py)<10/scale;
}

function dist(t1,t2){
    let dx=t2.clientX-t1.clientX, dy=t2.clientY-t1.clientY;
    return Math.hypot(dx,dy);
}

function saveDXF(){
    let dxf=new DXFDocument();
    lines.forEach(L=>{
        dxf.addLine(L.x1,L.y1,L.x2,L.y2,L.w*10);
    });
    let blob=new Blob([dxf.toDxfString()],{type:'application/dxf'});
    let url=URL.createObjectURL(blob);
    let a=document.createElement('a');
    a.href=url; a.download='drawing.dxf';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url),100);
}

window.addEventListener('load',init);
</script>
</body>
</html>
