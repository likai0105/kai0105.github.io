<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DXF绘图工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        // 简化版DXF生成器（修复下载失败问题）
        class DXFDocument {
            constructor() {
                this.lines = [];
                this.header = `0

                this.footer = `0

            }

            addLine(x1, y1, x2, y2, lineweight = 20) {
                this.lines.push(`0

            }

            toDxfString() {
                return this.header + this.lines.join('\n') + this.footer;
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .panel-shadow {
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            }
            .btn-hover {
                @apply transition-all duration-200 hover:bg-white/10 active:scale-95;
            }
            .input-focus {
                @apply focus:ring-2 focus:ring-white/30 focus:outline-none;
            }
            .canvas-container {
                touch-action: none;
            }
            /* 磨砂玻璃效果 */
            .glass-effect {
                background: rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.12);
            }
            .glass-effect-hover {
                @apply hover:bg-white/15 transition-all duration-200;
            }
        }
        
        body {
            overscroll-behavior: none;
            touch-action: none;
            @apply bg-gray-900 text-white overflow-hidden h-screen;
        }
        
        .control-panel {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            @apply glass-effect;
        }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        
        .slider-thumb::-webkit-slider-thumb {
            @apply appearance-none w-5 h-5 rounded-full glass-effect cursor-pointer;
        }
        
        .slider-thumb::-moz-range-thumb {
            @apply w-5 h-5 rounded-full glass-effect border-0 cursor-pointer;
        }

        /* 数字按键 - 圆形 + 苹果拨号键布局 */
        .num-btn {
            @apply glass-effect rounded-full flex items-center justify-center text-xl transition-all duration-200 hover:bg-white/15 active:scale-95 !important;
            width: 50px !important;
            height: 50px !important;
            font-size: 1.25rem !important;
            padding: 0 !important;
            min-width: unset !important;
            min-height: unset !important;
        }

        /* 方向按钮 - 圆形 */
        .direction-btn {
            @apply glass-effect rounded-full flex items-center justify-center btn-hover !important;
            width: 50px !important;
            height: 50px !important;
        }

        /* 保留原有界面的核心样式 */
        .top-toolbar {
            @apply absolute top-4 left-1/2 transform -translate-x-1/2 z-10 flex items-center space-x-4 px-4 py-2 rounded-full panel-shadow glass-effect;
        }
        
        .left-panel {
            @apply absolute left-4 top-1/2 transform -translate-y-1/2 z-10 rounded-2xl p-4 w-48 panel-shadow glass-effect;
        }
        
        .right-panel {
            @apply absolute right-4 top-1/2 transform -translate-y-1/2 z-10 rounded-2xl p-4 w-40 panel-shadow glass-effect;
        }

        /* 通用按钮样式 - 磨砂玻璃 */
        button:not(.num-btn):not(.direction-btn) {
            @apply glass-effect !important;
        }

        /* 清除按钮 - 独立样式 */
        #clear-btn {
            @apply glass-effect rounded-lg p-3 text-center text-xl w-full glass-effect-hover !important;
        }

        /* 功能按钮样式 */
        .function-btn {
            @apply glass-effect rounded-lg p-3 flex items-center justify-center btn-hover w-full;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'transparent',
                        secondary: 'transparent',
                        accent: 'transparent',
                        dark: 'transparent',
                    },
                }
            }
        }
    </script>
</head>
<body>
    <div class="flex flex-col h-screen relative">
        <!-- 顶部工具栏 - 保留原有样式 -->
        <div class="top-toolbar">
            <button id="zoom-in" class="w-10 h-10 flex items-center justify-center rounded-full glass-effect btn-hover">
                <i class="fa fa-search-plus text-lg"></i>
            </button>
            <button id="zoom-out" class="w-10 h-10 flex items-center justify-center rounded-full glass-effect btn-hover">
                <i class="fa fa-search-minus text-lg"></i>
            </button>
            <button id="zoom-reset" class="w-10 h-10 flex items-center justify-center rounded-full glass-effect btn-hover">
                <i class="fa fa-arrows-alt text-lg"></i>
            </button>
            <div class="h-6 border-r border-white/20 mx-1"></div>
            <button id="history-btn" class="w-10 h-10 flex items-center justify-center rounded-full glass-effect btn-hover">
                <i class="fa fa-history text-lg"></i>
            </button>
            <button id="save-btn" class="w-10 h-10 flex items-center justify-center rounded-full glass-effect btn-hover">
                <i class="fa fa-download text-lg"></i>
            </button>
            <button id="share-btn" class="w-10 h-10 flex items-center justify-center rounded-full glass-effect btn-hover">
                <i class="fa fa-share-alt text-lg"></i>
            </button>
        </div>
        
        <!-- 主画布区域 - 保留原有样式 -->
        <div id="canvas-container" class="canvas-container flex-1 relative overflow-hidden">
            <canvas id="drawing-canvas" class="absolute top-0 left-0"></canvas>
        </div>
        
        <!-- 左侧控制面板 - 调整数字键盘布局 -->
        <div class="left-panel">
            <div class="mb-4">
                <label class="block text-xs text-gray-300 mb-1">长度 (mm)</label>
                <div class="relative">
                    <input type="number" id="distance-input" class="w-full glass-effect rounded-lg px-3 py-2 text-center input-focus text-lg" value="100" min="1" max="200000">
                    <div class="absolute -right-2 -top-2 glass-effect text-xs px-2 py-1 rounded-full">mm</div>
                </div>
                
                <!-- 数字输入键盘 - 苹果拨号键布局 (圆形) -->
                <div class="mt-3 grid grid-cols-3 gap-2 justify-items-center">
                    <button class="num-btn" data-value="1">1</button>
                    <button class="num-btn" data-value="2">2</button>
                    <button class="num-btn" data-value="3">3</button>
                    <button class="num-btn" data-value="4">4</button>
                    <button class="num-btn" data-value="5">5</button>
                    <button class="num-btn" data-value="6">6</button>
                    <button class="num-btn" data-value="7">7</button>
                    <button class="num-btn" data-value="8">8</button>
                    <button class="num-btn" data-value="9">9</button>
                    <button class="num-btn" data-value="00">00</button>
                    <button class="num-btn" data-value="0">0</button>
                    <button class="num-btn" data-value=".">.</button>
                </div>
                
                <!-- 清除按钮 - 独立出来 -->
                <button id="clear-btn" class="mt-3">
                    <i class="fa fa-times mr-1"></i>清除
                </button>
            </div>
            
            <!-- 确认按钮 -->
            <button id="confirm-btn" class="function-btn mb-3">
                <i class="fa fa-check text-xl mr-2"></i>
                <span>确认</span>
            </button>
            
            <!-- 删除按钮 -->
            <button id="delete-btn" class="function-btn mb-4">
                <i class="fa fa-trash text-xl mr-2"></i>
                <span>删除</span>
            </button>
            
            <!-- 线宽控制 -->
            <div class="mb-4">
                <label class="block text-xs text-gray-300 mb-1">线宽</label>
                <input type="range" id="line-width" class="w-full slider-thumb" min="1" max="10" value="2">
                <div class="text-center text-sm mt-1 text-gray-300" id="line-width-value">2px</div>
            </div>
        </div>
        
        <!-- 右侧控制面板 - 方向键改为圆形 -->
        <div class="right-panel">
            <div class="mb-4">
                <button id="select-start-btn" class="function-btn">
                    <i class="fa fa-crosshairs text-xl mr-2"></i>
                    <span>选择起点</span>
                </button>
                
                <!-- 显示长度按钮 - 移到选择起点按钮下方 -->
                <button id="toggle-length-btn" class="function-btn mt-3">
                    <i class="fa fa-font text-xl mr-2"></i>
                    <span>显示长度</span>
                </button>
            </div>
            
            <div class="mb-6">
                <label class="block text-xs text-gray-300 mb-2 text-center">线走向</label>
                <div class="flex flex-col items-center space-y-2">
                    <button class="direction-btn" data-direction="up">
                        <i class="fa fa-arrow-up text-xl"></i>
                    </button>
                    <div class="flex space-x-2">
                        <button class="direction-btn" data-direction="left">
                            <i class="fa fa-arrow-left text-xl"></i>
                        </button>
                        <button class="direction-btn" data-direction="right">
                            <i class="fa fa-arrow-right text-xl"></i>
                        </button>
                    </div>
                    <button class="direction-btn" data-direction="down">
                        <i class="fa fa-arrow-down text-xl"></i>
                    </button>
                </div>
            </div>
            
            <div>
                <label class="block text-xs text-gray-300 mb-1">坐标</label>
                <div class="glass-effect rounded-lg p-2 text-xs text-center">
                    <div id="current-position" class="text-gray-200">X: 0, Y: 0</div>
                </div>
            </div>
        </div>
        
        <!-- 分享菜单 (默认隐藏) -->
        <div id="share-menu" class="fixed inset-0 bg-black/50 z-20 hidden flex items-center justify-center">
            <div class="glass-effect rounded-2xl p-6 w-80 panel-shadow">
                <h3 class="text-lg font-semibold mb-4 text-center text-gray-100">分享或保存</h3>
                <div class="space-y-3">
                    <button id="save-dxf" class="function-btn">
                        <i class="fa fa-file-text-o text-lg mr-2"></i>
                        <span>保存为DXF</span>
                    </button>
                    <button id="save-image" class="function-btn">
                        <i class="fa fa-image text-lg mr-2"></i>
                        <span>保存为图片</span>
                    </button>
                    <button id="share-wechat" class="function-btn">
                        <i class="fa fa-weixin text-lg mr-2"></i>
                        <span>分享到微信</span>
                    </button>
                </div>
                <button id="close-share" class="function-btn mt-4">
                    <i class="fa fa-times text-lg mr-2"></i>
                    <span>关闭</span>
                </button>
            </div>
        </div>
        
        <!-- 历史记录面板 (默认隐藏) -->
        <div id="history-panel" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 z-10 control-panel rounded-2xl p-4 w-3/4 max-w-md panel-shadow hidden">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-lg font-semibold text-gray-100">历史记录</h3>
                <button id="close-history" class="w-8 h-8 flex items-center justify-center rounded-full glass-effect hover:bg-white/10">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div id="history-list" class="max-h-60 overflow-y-auto space-y-2">
                <div class="text-gray-400 text-center py-4">暂无历史记录</div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量 - 保留原有逻辑
        let canvas, ctx;
        let currentX = 0, currentY = 0;
        let scale = 1;
        let isDragging = false;
        let lastX, lastY;
        let offsetX = 0, offsetY = 0;
        let lines = [];
        let history = [];
        let historyIndex = -1;
        let isDeleting = false;
        let isSelectingStartPoint = false;
        let selectedDirection = null;
        let lineWidth = 2;
        let gridSize = 10; // 10毫米一格
        let showEndpointGuide = true;
        let showLineLength = false; // 新增：是否显示线段长度
        // 200m*200m画布范围（毫米）
        let canvasMinX = -100000, canvasMaxX = 100000;
        let canvasMinY = -100000, canvasMaxY = 100000;
        
        // 双指缩放相关变量 - 保留原有逻辑
        let isPinching = false;
        let initialPinchDistance = 0;
        let initialPinchScale = 1;
        let initialPinchOffsetX = 0;
        let initialPinchOffsetY = 0;
        let initialPinchCenterX = 0;
        let initialPinchCenterY = 0;
        
        // 初始化函数 - 保留原有逻辑
        function init() {
            canvas = document.getElementById('drawing-canvas');
            ctx = canvas.getContext('2d');
            
            // 设置Canvas大小
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 初始化事件监听
            setupEventListeners();
            
            // 初始绘制
            drawAll();
            updatePositionDisplay();
        }
        
        // 调整Canvas大小 - 保留原有逻辑
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            // 重绘所有内容
            drawAll();
        }
        
        // 设置事件监听 - 保留原有逻辑+新增长度按钮监听
        function setupEventListeners() {
            // 数字键盘按钮（圆形拨号键）
            document.querySelectorAll('.num-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const input = document.getElementById('distance-input');
                    const value = btn.dataset.value;
                    
                    // 处理小数点
                    if (value === '.' && input.value.includes('.')) return;
                    
                    input.value += value;
                    
                    // 限制最大值200000
                    const numValue = parseFloat(input.value) || 0;
                    if (numValue > 200000) {
                        input.value = '200000';
                    }
                });
            });
            
            // 清除按钮（独立）
            document.getElementById('clear-btn').addEventListener('click', () => {
                const input = document.getElementById('distance-input');
                input.value = '';
            });
            
            // 方向按钮 - 圆形样式
            document.querySelectorAll('.direction-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (isDeleting || isSelectingStartPoint) return;
                    
                    document.querySelectorAll('.direction-btn').forEach(b => {
                        b.classList.remove('bg-white/20');
                    });
                    
                    btn.classList.add('bg-white/20');
                    selectedDirection = btn.dataset.direction;
                });
            });
            
            // 确认按钮 - 核心修改：绘制后整体图形居中
            document.getElementById('confirm-btn').addEventListener('click', () => {
                if (isDeleting || isSelectingStartPoint || !selectedDirection) return;
                
                const distanceInput = document.getElementById('distance-input');
                const distance = parseInt(distanceInput.value) || 0;
                
                if (distance > 0) {
                    drawLine(selectedDirection, distance);
                    
                    // 清除选中的方向
                    document.querySelectorAll('.direction-btn').forEach(btn => {
                        btn.classList.remove('bg-white/20');
                    });
                    selectedDirection = null;
                    
                    // 清空输入框
                    distanceInput.value = '';
                    
                    // 核心修改：绘制后整体图形居中
                    centerDrawing();
                }
            });

            // 新增：显示/隐藏线段长度按钮
            document.getElementById('toggle-length-btn').addEventListener('click', () => {
                showLineLength = !showLineLength;
                const btn = document.getElementById('toggle-length-btn');
                if (showLineLength) {
                    btn.innerHTML = '<i class="fa fa-font text-xl mr-2"></i><span>隐藏长度</span>';
                } else {
                    btn.innerHTML = '<i class="fa fa-font text-xl mr-2"></i><span>显示长度</span>';
                }
                drawAll();
            });
            
            // 删除按钮 - 保留原有逻辑
            document.getElementById('delete-btn').addEventListener('click', toggleDeleteMode);
            
            // 线宽滑块 - 保留原有逻辑
            const lineWidthSlider = document.getElementById('line-width');
            const lineWidthValue = document.getElementById('line-width-value');
            
            lineWidthSlider.addEventListener('input', () => {
                lineWidth = parseInt(lineWidthSlider.value);
                lineWidthValue.textContent = `${lineWidth}px`;
            });
            
            // 缩放按钮 - 保留原有逻辑
            document.getElementById('zoom-in').addEventListener('click', () => {
                scale *= 1.2;
                drawAll();
            });
            
            document.getElementById('zoom-out').addEventListener('click', () => {
                scale /= 1.2;
                drawAll();
            });
            
            document.getElementById('zoom-reset').addEventListener('click', () => {
                scale = 1;
                offsetX = 0;
                offsetY = 0;
                drawAll();
            });
            
            // 选择起点按钮 - 保留原有逻辑
            document.getElementById('select-start-btn').addEventListener('click', toggleSelectStartPoint);
            
            // 历史记录按钮 - 保留原有逻辑
            document.getElementById('history-btn').addEventListener('click', toggleHistoryPanel);
            document.getElementById('close-history').addEventListener('click', toggleHistoryPanel);
            
            // 保存和分享（修复DXF下载）
            document.getElementById('save-btn').addEventListener('click', saveDXF);
            document.getElementById('share-btn').addEventListener('click', () => {
                document.getElementById('share-menu').classList.remove('hidden');
            });
            
            document.getElementById('close-share').addEventListener('click', () => {
                document.getElementById('share-menu').classList.add('hidden');
            });
            
            document.getElementById('save-dxf').addEventListener('click', () => {
                saveDXF();
                document.getElementById('share-menu').classList.add('hidden');
            });
            
            document.getElementById('save-image').addEventListener('click', () => {
                saveImage();
                document.getElementById('share-menu').classList.add('hidden');
            });
            
            document.getElementById('share-wechat').addEventListener('click', shareToWeChat);
            
            // 单指拖拽画布（查看用）- 保留原有逻辑
            canvas.addEventListener('mousedown', handleCanvasMouseDown);
            canvas.addEventListener('mousemove', drag);
            canvas.addEventListener('mouseup', endDrag);
            canvas.addEventListener('mouseleave', endDrag);
            
            // 触摸事件 - 双指缩放+移动 - 保留原有逻辑
            canvas.addEventListener('touchstart', handleTouchStart);
            canvas.addEventListener('touchmove', handleTouchMove);
            canvas.addEventListener('touchend', handleTouchEnd);
            canvas.addEventListener('touchcancel', handleTouchEnd);
        }

        // 核心功能：绘制后整体图形居中 - 新增功能
        function centerDrawing() {
            if (lines.length === 0) return;
            
            // 计算所有线条的边界框
            let minX = Infinity, maxX = -Infinity;
            let minY = Infinity, maxY = -Infinity;
            
            lines.forEach(line => {
                minX = Math.min(minX, line.startX, line.endX);
                maxX = Math.max(maxX, line.startX, line.endX);
                minY = Math.min(minY, line.startY, line.endY);
                maxY = Math.max(maxY, line.startY, line.endY);
            });
            
            // 计算中心点
            const centerX = (minX + maxX) / 2;
            const centerY = (minY + maxY) / 2;
            
            // 计算画布中心位置
            const canvasCenterX = canvas.width / 2;
            const canvasCenterY = canvas.height / 2;
            
            // 调整偏移量使图形居中
            offsetX = canvasCenterX - centerX * scale;
            offsetY = canvasCenterY - centerY * scale;
            
            drawAll();
        }
        
        // 保留原有触摸/拖拽/绘制等所有核心逻辑
        function getDistance(touch1, touch2) {
            const dx = touch2.clientX - touch1.clientX;
            const dy = touch2.clientY - touch1.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }
        
        function getCenterPoint(touch1, touch2) {
            return {
                x: (touch1.clientX + touch2.clientX) / 2,
                y: (touch1.clientY + touch2.clientY) / 2
            };
        }
        
        function handleTouchStart(e) {
            e.preventDefault();
            
            if (e.touches.length === 2) {
                isPinching = true;
                initialPinchDistance = getDistance(e.touches[0], e.touches[1]);
                initialPinchScale = scale;
                initialPinchOffsetX = offsetX;
                initialPinchOffsetY = offsetY;
                
                const center = getCenterPoint(e.touches[0], e.touches[1]);
                initialPinchCenterX = center.x;
                initialPinchCenterY = center.y;
            } 
            else if (e.touches.length === 1) {
                const touch = e.touches[0];
                
                if (isSelectingStartPoint) {
                    const rect = canvas.getBoundingClientRect();
                    let newX = (touch.clientX - rect.left - offsetX) / scale;
                    let newY = (touch.clientY - rect.top - offsetY) / scale;
                    
                    newX = Math.round(newX / gridSize) * gridSize;
                    newY = Math.round(newY / gridSize) * gridSize;
                    
                    if (newX >= canvasMinX && newX <= canvasMaxX && newY >= canvasMinY && newY <= canvasMaxY) {
                        history.push({
                            action: 'move',
                            fromX: currentX,
                            fromY: currentY,
                            toX: newX,
                            toY: newY,
                            timestamp: new Date()
                        });
                        
                        historyIndex = history.length - 1;
                        if (history.length > 50) {
                            history.shift();
                            historyIndex--;
                        }
                        
                        currentX = newX;
                        currentY = newY;
                        
                        drawAll();
                        updatePositionDisplay();
                        updateHistoryPanel();
                        
                        toggleSelectStartPoint();
                    }
                } else {
                    isDragging = true;
                    lastX = touch.clientX;
                    lastY = touch.clientY;
                    canvas.style.cursor = 'grabbing';
                }
            }
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            
            if (e.touches.length === 2 && isPinching) {
                const currentDistance = getDistance(e.touches[0], e.touches[1]);
                const scaleFactor = currentDistance / initialPinchDistance;
                
                const newScale = Math.max(0.1, Math.min(10, initialPinchScale * scaleFactor));
                const scaleDiff = newScale / initialPinchScale;
                
                const currentCenter = getCenterPoint(e.touches[0], e.touches[1]);
                const dx = currentCenter.x - initialPinchCenterX;
                const dy = currentCenter.y - initialPinchCenterY;
                
                scale = newScale;
                offsetX = initialPinchOffsetX + dx + (initialPinchCenterX - initialPinchOffsetX) * (1 - scaleDiff);
                offsetY = initialPinchOffsetY + dy + (initialPinchCenterY - initialPinchOffsetY) * (1 - scaleDiff);
                
                drawAll();
            } 
            else if (e.touches.length === 1 && isDragging && !isSelectingStartPoint && !isDeleting) {
                const touch = e.touches[0];
                const deltaX = touch.clientX - lastX;
                const deltaY = touch.clientY - lastY;
                
                offsetX += deltaX;
                offsetY += deltaY;
                
                lastX = touch.clientX;
                lastY = touch.clientY;
                
                drawAll();
            }
        }
        
        function handleTouchEnd(e) {
            e.preventDefault();
            
            if (e.touches.length < 2) {
                isPinching = false;
            }
            
            if (e.touches.length < 1) {
                isDragging = false;
                canvas.style.cursor = 'grab';
            }
        }
        
        function drawLine(direction, distance) {
            if (isSelectingStartPoint) return;
            
            const startX = currentX;
            const startY = currentY;
            let endX = startX;
            let endY = startY;
            
            switch (direction) {
                case 'up':
                    endY = startY - distance;
                    break;
                case 'down':
                    endY = startY + distance;
                    break;
                case 'left':
                    endX = startX - distance;
                    break;
                case 'right':
                    endX = startX + distance;
                    break;
            }
            
            endX = Math.max(canvasMinX, Math.min(canvasMaxX, endX));
            endY = Math.max(canvasMinY, Math.min(canvasMaxY, endY));
            
            // 添加线条（记录长度）
            const newLine = {
                startX,
                startY,
                endX,
                endY,
                width: lineWidth,
                length: distance // 记录线段长度
            };
            lines.push(newLine);
            
            saveToHistory(newLine);
            
            currentX = endX;
            currentY = endY;
            
            drawAll();
            updatePositionDisplay();
        }
        
        function saveToHistory(line) {
            if (historyIndex < history.length - 1) {
                history = history.slice(0, historyIndex + 1);
            }
            
            history.push({
                action: 'draw',
                line: { ...line },
                timestamp: new Date()
            });
            
            historyIndex = history.length - 1;
            
            if (history.length > 50) {
                history.shift();
                historyIndex--;
            }
            
            updateHistoryPanel();
        }
        
        // 绘制所有内容（修改：线段长度标注样式）
        function drawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);
            
            // 绘制所有线条
            lines.forEach(line => {
                ctx.beginPath();
                ctx.moveTo(line.startX, line.startY);
                ctx.lineTo(line.endX, line.endY);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = line.width / scale;
                ctx.stroke();
                
                // 端点红点指引
                if (showEndpointGuide) {
                    ctx.beginPath();
                    ctx.arc(line.startX, line.startY, 3 / scale, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.8)';
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(line.endX, line.endY, 3 / scale, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.8)';
                    ctx.fill();
                }

                // 修改：绘制线段长度（平行于线条、红色、无单位）
                if (showLineLength && line.length) {
                    const midX = (line.startX + line.endX) / 2;
                    const midY = (line.startY + line.endY) / 2;
                    
                    // 计算线条角度
                    const dx = line.endX - line.startX;
                    const dy = line.endY - line.startY;
                    const angle = Math.atan2(dy, dx);
                    
                    // 保存当前状态
                    ctx.save();
                    
                    // 平移到中点并旋转文本使其平行于线条
                    ctx.translate(midX, midY);
                    ctx.rotate(angle);
                    
                    // 设置文本样式（红色、无单位）
                    ctx.font = `${24 / scale}px Arial`; // 增大字体更醒目
                    ctx.fillStyle = '#ff0000'; // 纯红色（参考图片颜色）
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    // 绘制长度数字（无单位）
                    ctx.fillText(`${line.length}`, 0, 0);
                    
                    // 恢复状态
                    ctx.restore();
                }
            });
            
            // 绘制当前光标
            if (!isDeleting) {
                ctx.beginPath();
                ctx.arc(currentX, currentY, 5 / scale, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(59, 130, 246, 0.8)';
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        function updatePositionDisplay() {
            document.getElementById('current-position').textContent = `X: ${currentX}, Y: ${currentY}`;
        }
        
        function toggleDeleteMode() {
            isDeleting = !isDeleting;
            const deleteBtn = document.getElementById('delete-btn');
            
            if (isDeleting) {
                deleteBtn.innerHTML = '<i class="fa fa-check text-xl mr-2"></i><span>确认</span>';
                canvas.addEventListener('click', deleteLineAtPosition);
            } else {
                deleteBtn.innerHTML = '<i class="fa fa-trash text-xl mr-2"></i><span>删除</span>';
                canvas.removeEventListener('click', deleteLineAtPosition);
            }
            
            drawAll();
        }
        
        function deleteLineAtPosition(e) {
            if (!isDeleting) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left - offsetX) / scale;
            const mouseY = (e.clientY - rect.top - offsetY) / scale;
            
            const lineIndex = lines.findIndex(line => {
                return isPointOnLine(mouseX, mouseY, line.startX, line.startY, line.endX, line.endY, 10 / scale);
            });
            
            if (lineIndex !== -1) {
                const deletedLine = lines[lineIndex];
                lines.splice(lineIndex, 1);
                
                history.push({
                    action: 'delete',
                    line: { ...deletedLine },
                    index: lineIndex,
                    timestamp: new Date()
                });
                
                historyIndex = history.length - 1;
                if (history.length > 50) {
                    history.shift();
                    historyIndex--;
                }
                
                drawAll();
                updateHistoryPanel();
            }
        }
        
        function isPointOnLine(px, py, x1, y1, x2, y2, tolerance) {
            const A = px - x1;
            const B = py - y1;
            const C = x2 - x1;
            const D = y2 - y1;
            
            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            let param = -1;
            
            if (lenSq !== 0) param = dot / lenSq;
            
            let xx, yy;
            
            if (param < 0) {
                xx = x1;
                yy = y1;
            } else if (param > 1) {
                xx = x2;
                yy = y2;
            } else {
                xx = x1 + param * C;
                yy = y1 + param * D;
            }
            
            const dx = px - xx;
            const dy = py - yy;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            return distance < tolerance;
        }
        
        function handleCanvasMouseDown(e) {
            if (isSelectingStartPoint) {
                const rect = canvas.getBoundingClientRect();
                let newX = (e.clientX - rect.left - offsetX) / scale;
                let newY = (e.clientY - rect.top - offsetY) / scale;
                
                newX = Math.round(newX / gridSize) * gridSize;
                newY = Math.round(newY / gridSize) * gridSize;
                
                if (newX >= canvasMinX && newX <= canvasMaxX && newY >= canvasMinY && newY <= canvasMaxY) {
                    history.push({
                        action: 'move',
                        fromX: currentX,
                        fromY: currentY,
                        toX: newX,
                        toY: newY,
                        timestamp: new Date()
                    });
                    
                    historyIndex = history.length - 1;
                    if (history.length > 50) {
                        history.shift();
                        historyIndex--;
                    }
                    
                    currentX = newX;
                    currentY = newY;
                    
                    drawAll();
                    updatePositionDisplay();
                    updateHistoryPanel();
                    
                    toggleSelectStartPoint();
                }
            } else if (!isDeleting) {
                startDrag(e);
            }
        }
        
        function startDrag(e) {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            canvas.style.cursor = 'grabbing';
        }
        
        function drag(e) {
            if (!isDragging || isDeleting) return;
            
            const deltaX = e.clientX - lastX;
            const deltaY = e.clientY - lastY;
            
            offsetX += deltaX;
            offsetY += deltaY;
            
            lastX = e.clientX;
            lastY = e.clientY;
            
            drawAll();
        }
        
        function endDrag() {
            isDragging = false;
            canvas.style.cursor = 'grab';
        }
        
        // 修复DXF下载功能 - 核心修复
        function saveDXF() {
            try {
                const dxf = new DXFDocument();
                
                lines.forEach(line => {
                    dxf.addLine(
                        line.startX, 
                        line.startY, 
                        line.endX, 
                        line.endY, 
                        line.width * 10 // 线宽转换为DXF单位
                    );
                });
                
                const dxfContent = dxf.toDxfString();
                
                const blob = new Blob([dxfContent], { 
                    type: 'application/octet-stream' 
                });
                
                // 兼容iPad/移动端下载
                if (window.navigator.msSaveOrOpenBlob) {
                    window.navigator.msSaveBlob(blob, 'drawing.dxf');
                } else {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'drawing.dxf';
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    
                    // 模拟点击（兼容移动端）
                    const event = new MouseEvent('click', {
                        bubbles: true,
                        cancelable: true,
                        view: window
                    });
                    a.dispatchEvent(event);
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    }, 100);
                }
                
                showToast('DXF文件已成功保存！');
            } catch (error) {
                console.error('保存DXF失败:', error);
                showToast('保存失败：' + error.message);
            }
        }
        
        function saveImage() {
            try {
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                
                const margin = 50;
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                
                lines.forEach(line => {
                    minX = Math.min(minX, line.startX, line.endX);
                    maxX = Math.max(maxX, line.startX, line.endX);
                    minY = Math.min(minY, line.startY, line.endY);
                    maxY = Math.max(maxY, line.startY, line.endY);
                });
                
                if (minX === Infinity) {
                    minX = -100;
                    maxX = 100;
                    minY = -100;
                    maxY = 100;
                }
                
                const width = maxX - minX + margin * 2;
                const height = maxY - minY + margin * 2;
                
                tempCanvas.width = width;
                tempCanvas.height = height;
                
                tempCtx.fillStyle = 'white';
                tempCtx.fillRect(0, 0, width, height);
                
                lines.forEach(line => {
                    tempCtx.beginPath();
                    tempCtx.moveTo(line.startX - minX + margin, line.startY - minY + margin);
                    tempCtx.lineTo(line.endX - minX + margin, line.endY - minY + margin);
                    tempCtx.strokeStyle = 'black';
                    tempCtx.lineWidth = line.width;
                    tempCtx.stroke();
                    
                    // 修改：保存图片时的长度显示样式
                    if (showLineLength && line.length) {
                        const midX = (line.startX + line.endX) / 2;
                        const midY = (line.startY + line.endY) / 2;
                        const dx = line.endX - line.startX;
                        const dy = line.endY - line.startY;
                        const angle = Math.atan2(dy, dx);
                        
                        tempCtx.save();
                        tempCtx.translate(midX - minX + margin, midY - minY + margin);
                        tempCtx.rotate(angle);
                        tempCtx.font = '24px Arial';
                        tempCtx.fillStyle = '#ff0000';
                        tempCtx.textAlign = 'center';
                        tempCtx.textBaseline = 'middle';
                        tempCtx.fillText(`${line.length}`, 0, 0);
                        tempCtx.restore();
                    }
                });
                
                tempCanvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'drawing.png';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                    showToast('图片已保存');
                });
            } catch (error) {
                console.error('保存图片失败:', error);
                showToast('保存失败，请重试');
            }
        }
        
        function shareToWeChat() {
            showToast('微信分享功能需要在实际应用中集成微信API');
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-10 left-1/2 transform -translate-x-1/2 glass-effect text-white px-4 py-2 rounded-lg z-30';
            toast.textContent = message;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'transition-opacity', 'duration-300');
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 2000);
        }
        
        function toggleHistoryPanel() {
            const historyPanel = document.getElementById('history-panel');
            historyPanel.classList.toggle('hidden');
            
            if (!historyPanel.classList.contains('hidden')) {
                updateHistoryPanel();
            }
        }
        
        function updateHistoryPanel() {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';
            
            if (history.length === 0) {
                historyList.innerHTML = '<div class="text-gray-400 text-center py-4">暂无历史记录</div>';
                return;
            }
            
            for (let i = history.length - 1; i >= 0; i--) {
                const record = history[i];
                const isCurrent = i === historyIndex;
                
                const recordItem = document.createElement('div');
                recordItem.className = `flex items-center justify-between p-2 rounded-lg ${isCurrent ? 'bg-white/10' : 'glass-effect'}`;
                
                let actionText;
                if (record.action === 'draw') {
                    actionText = '绘制线条';
                } else if (record.action === 'delete') {
                    actionText = '删除线条';
                } else if (record.action === 'move') {
                    actionText = '移动起点';
                }
                const timeText = formatTime(record.timestamp);
                
                recordItem.innerHTML = `
                    <div>
                        <div class="font-medium text-gray-100">${actionText}</div>
                        <div class="text-xs text-gray-400">${timeText}</div>
                    </div>
                    <button class="history-jump-btn px-3 py-1 rounded glass-effect hover:bg-white/10 text-sm" data-index="${i}">
                        跳转
                    </button>
                `;
                
                historyList.appendChild(recordItem);
            }
            
            document.querySelectorAll('.history-jump-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = parseInt(btn.dataset.index);
                    jumpToHistory(index);
                });
            });
        }
        
        function jumpToHistory(targetIndex) {
            while (historyIndex < targetIndex) {
                redo();
            }
            
            while (historyIndex > targetIndex) {
                undo();
            }
            
            toggleHistoryPanel();
        }
        
        function undo() {
            if (historyIndex < 0) return;
            
            const record = history[historyIndex];
            
            if (record.action === 'draw') {
                lines.pop();
            } else if (record.action === 'delete') {
                lines.splice(record.index, 0, record.line);
            } else if (record.action === 'move') {
                currentX = record.fromX;
                currentY = record.fromY;
            }
            
            historyIndex--;
            updateCanvasFromHistory();
        }
        
        function redo() {
            if (historyIndex >= history.length - 1) return;
            
            historyIndex++;
            const record = history[historyIndex];
            
            if (record.action === 'draw') {
                lines.push(record.line);
            } else if (record.action === 'delete') {
                lines.splice(record.index, 1);
            } else if (record.action === 'move') {
                currentX = record.toX;
                currentY = record.toY;
            }
            
            updateCanvasFromHistory();
        }
        
        function updateCanvasFromHistory() {
            if (lines.length > 0) {
                const lastLine = lines[lines.length - 1];
                currentX = lastLine.endX;
                currentY = lastLine.endY;
            } else {
                currentX = 0;
                currentY = 0;
            }
            
            drawAll();
            updatePositionDisplay();
        }
        
        function toggleSelectStartPoint() {
            isSelectingStartPoint = !isSelectingStartPoint;
            const selectBtn = document.getElementById('select-start-btn');
            
            if (isSelectingStartPoint) {
                selectBtn.innerHTML = '<i class="fa fa-check text-xl mr-2"></i><span>确认选择</span>';
                canvas.style.cursor = 'crosshair';
                
                if (isDeleting) {
                    toggleDeleteMode();
                }
            } else {
                selectBtn.innerHTML = '<i class="fa fa-crosshairs text-xl mr-2"></i><span>选择起点</span>';
                canvas.style.cursor = 'grab';
            }
            
            drawAll();
        }
        
        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            
            if (date.toDateString() === now.toDateString()) {
                return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }
            
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            if (date.toDateString() === yesterday.toDateString()) {
                return '昨天 ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }
            
            return date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }) + ' ' + 
                   date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }
        
        // 初始化应用
        window.addEventListener('load', init);
    </script>
</body>
